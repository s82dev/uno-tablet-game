<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNO EASY LINK</title>

<style>
body{font-family:sans-serif;text-align:center;background:#111;color:white;}
textarea{width:90%;height:100px;}
button{font-size:18px;padding:10px;margin:5px;}
</style>
</head>

<body>

<h1>UNO 🔥</h1>

<button onclick="create()">HOST</button>
<button onclick="join()">JOIN</button>

<br><br>
<textarea id="signal"></textarea>

<h3 id="link"></h3>

<script>
let pc = new RTCPeerConnection();
let dc;

function create(){
  dc = pc.createDataChannel("game");

  pc.onicecandidate = e=>{
    if(!e.candidate){
      let code = btoa(JSON.stringify(pc.localDescription));
      signal.value = code;

      let url = location.origin + location.pathname + "?join=" + code;
      link.innerHTML = "👉 Share this link:<br>" + url;
    }
  };

  pc.createOffer().then(o=>pc.setLocalDescription(o));
}

function join(){
  let code = signal.value || new URLSearchParams(location.search).get("join");
  if(!code) return alert("No code!");

  let offer = JSON.parse(atob(code));

  pc.ondatachannel = e=>{
    dc = e.channel;
    alert("Connected!");
  };

  pc.onicecandidate = e=>{
    if(!e.candidate){
      let answer = btoa(JSON.stringify(pc.localDescription));
      signal.value = answer;
      alert("Send this back to host!");
    }
  };

  pc.setRemoteDescription(offer)
    .then(()=>pc.createAnswer())
    .then(a=>pc.setLocalDescription(a));
}

// AUTO JOIN wenn Link benutzt wird
window.onload = ()=>{
  let code = new URLSearchParams(location.search).get("join");
  if(code){
    signal.value = code;
    join();
  }
};
</script>

</body>
</html>
