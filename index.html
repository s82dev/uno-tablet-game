<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNO ONLINE</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#ff512f,#dd2476);
  color:white;
  text-align:center;
}

h1{font-size:40px;margin-top:40px;}

button{
  font-size:22px;
  padding:15px 30px;
  border:none;
  border-radius:12px;
  margin:10px;
  background:white;
  color:#333;
}

input{
  font-size:22px;
  padding:15px;
  border-radius:10px;
  border:none;
  text-align:center;
  width:200px;
}

#code{
  font-size:60px;
  margin-top:20px;
}

</style>
</head>

<body>

<h1>UNO 🔥</h1>

<button onclick="create()">CREATE GAME</button>

<br><br>

<input id="joinCode" placeholder="ENTER CODE">
<br>
<button onclick="join()">JOIN GAME</button>

<div id="code"></div>

<script>
const ws = new WebSocket("wss://DEIN-LINK.up.railway.app");

ws.onmessage = (msg)=>{
  let data = JSON.parse(msg.data);

  if(data.type==="created"){
    code.innerText = data.code;
  }

  if(data.type==="start"){
    document.body.innerHTML = "<h1>GAME START 🎉</h1>";
  }

  if(data.type==="error"){
    alert("Game not found!");
  }
};

function create(){
  ws.send(JSON.stringify({type:"create"}));
}

function join(){
  let c = document.getElementById("joinCode").value.toUpperCase();
  ws.send(JSON.stringify({type:"join", code:c}));
}
</script>

</body>
</html>
