<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNO FIX</title>
</head>

<body style="background:#111;color:white;text-align:center;font-family:sans-serif;">

<h1>UNO 🔥</h1>

<button onclick="create()">HOST</button>
<button onclick="join()">JOIN</button>

<br><br>
<textarea id="signal" style="width:90%;height:120px;"></textarea>

<script>
let pc = new RTCPeerConnection();
let dc;

function log(x){ console.log(x); }

function create(){
  alert("HOST gestartet");

  dc = pc.createDataChannel("game");

  pc.onicecandidate = e=>{
    if(!e.candidate){
      signal.value = JSON.stringify(pc.localDescription);
    }
  };

  pc.createOffer().then(o=>pc.setLocalDescription(o));
}

function join(){
  alert("JOIN gestartet");

  let offer = JSON.parse(signal.value);

  pc.ondatachannel = e=>{
    dc = e.channel;
    alert("Verbunden!");
  };

  pc.onicecandidate = e=>{
    if(!e.candidate){
      signal.value = JSON.stringify(pc.localDescription);
    }
  };

  pc.setRemoteDescription(offer)
    .then(()=>pc.createAnswer())
    .then(a=>pc.setLocalDescription(a));
}
</script>

</body>
</html>
