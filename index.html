<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNO Tablet</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  background: #1e1e2f;
  color: white;
}

button {
  font-size: 20px;
  padding: 15px;
  margin: 5px;
  border-radius: 10px;
  border: none;
}

.card {
  display: inline-block;
  width: 80px;
  height: 120px;
  margin: 5px;
  border-radius: 12px;
  font-size: 22px;
  font-weight: bold;
}

.red { background: red; }
.green { background: green; }
.blue { background: blue; }
.yellow { background: gold; color: black; }

#hand {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #111;
  padding: 10px;
  overflow-x: scroll;
  white-space: nowrap;
}

</style>
</head>
<body>

<h1>UNO Tablet 🔥</h1>

<button onclick="create()">CREATE</button>
<input id="code" placeholder="CODE">
<button onclick="join()">JOIN</button>

<h2 id="info"></h2>
<div id="top"></div>

<div id="hand"></div>

<script>
let ws = new WebSocket("ws://localhost:3000");
let myTurn = false;

function create() {
  ws.send(JSON.stringify({ type: "create" }));
}

function join() {
  ws.send(JSON.stringify({
    type: "join",
    code: document.getElementById("code").value
  }));
}

ws.onmessage = msg => {
  const d = JSON.parse(msg.data);

  if (d.type === "created") {
    document.getElementById("info").innerText = "CODE: " + d.code;
  }

  if (d.type === "joined") {
    document.getElementById("info").innerText = "JOINED: " + d.code;
  }

  if (d.type === "update") {
    myTurn = d.turn === d.you;

    document.getElementById("top").innerHTML =
      `<div class="card ${d.pile.color}">
        ${d.pile.value}
      </div>`;

    let handHTML = "";
    d.hand.forEach(c => {
      handHTML += `
      <div class="card ${c.color}"
        onclick='play(${JSON.stringify(c)})'>
        ${c.value}
      </div>`;
    });

    document.getElementById("hand").innerHTML = handHTML;

    if (myTurn) {
      document.getElementById("info").innerText += " | YOUR TURN";
    }
  }
};

function play(card) {
  if (!myTurn) return;

  ws.send(JSON.stringify({
    type: "play",
    card
  }));
}
</script>

</body>
</html>
